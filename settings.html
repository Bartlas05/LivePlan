<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <script src="https://kit.fontawesome.com/38cd770473.js" crossorigin="anonymous"></script>
    <title>Live Plan</title>
    <link rel="stylesheet" href="ui.css">
    <script src="script.js"></script>
    <link rel="icon" href="/Icons/Live Plan Icon V2 -- Light.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/Icons/Live Plan Icon V2 -- Light (Android Maskable) 512x512.png">
</head>

<body>
    <header>
        <div class="userPicture"><i class="fa-solid fa-user-graduate"></i></div>
        <div class="headerTextWrapper">
            <div class="headerTextTopAsSettings">Ustawienia</div>
        </div>
        </div>
        <a href="index.html"><button class="settingsButtonClose"><i class="fa-solid fa-angle-left"></i></button></a>
    </header>

    <section class="settingsContent">

        <section class="settingsSection">
            <div class="settingsSectionHeader">Informacje o wersji</div>
            <div class="settingsSectionContent settingsSectionContent-typeColumn">
                <div class="settingsSectionContentHeader">Wersja aplikacji</div>
                <div class="settingsSectionContentText">
                    0.6.2
                </div>
            </div>

                        <div style="height: auto; padding: 10px; margin-top:10px;" class="settingsSectionContent settingsSectionContent-typeColumn">
                <div class="settingsSectionContentHeader">Lista zmian</div>
                <div class="settingsSectionContentText" id="changelog">
                   
                </div>
            </div>

            
        </section>

        

        <a href="raport.html">
            <section class="settingsSection">
                <div class="settingsSectionHeader">Kontakt</div>
                <div class="settingsSectionContent settingsSectionContent-button">
                    <i class="fa-regular fa-message"></i>
                    <div class="settingsSectionContentWrapper">
                        <div class="settingsSectionContentHeader">Wyślij opinię</div>
                        <div class="settingsSectionContentText">Zasugeruj zmiany lub zgłoś błąd</div>
                    </div>
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </section>
        </a>

    </section>





    <footer>
        <div id="bottomDock" class="bottomDock">
            <div class="bottomDockLiveWidgetPicture LiveWidgetPicture"><i class="fa-solid fa-user-graduate"></i></div>
            <div class="bottomDockWrapper">
                <div class="bottomDockLiveWidgetFirstInfoTop LiveWidgetFirstInfoTop"><span class="ID_type">Wykład</span>
                    • <span class="ID_room">202A</span></div>
                <div class="bottomDockLiveWidgetTopSectionRightTopText LiveWidgetTopSectionRightTopText ID_name">
                    Administracja
                    baz danych</div>
            </div>
            <div class="progressBarDock progressBar">
                <div class="progressBarSlider"></div>
                <div class="progressBarTimeWrapper">
                    <div class="progressBarTime"><span class="ID_start">9:30</span> - <span class="ID_end">11:00</span>
                    </div>
                </div>
            </div>
        </div>
        <nav>
            <a href="index.html">
                <buttton class="navButton navButton--focus">
                    <i class="fa-solid fa-house"></i>
                    <div class="navButtonText">Home</div>
                </buttton>
            </a>
            <span id="message1">Kolejne funkcje nadejdą w <br> następnych aktualizacjach.</span>
        </nav>
    </footer>



<script>
fetch('/changelog.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('changelog');

    data.forEach(entry => {
      // Tworzymy rozwijany element dla każdej wersji
      const details = document.createElement('details');

      // Nagłówek wersji
      const summary = document.createElement('summary');
      summary.textContent = `Wersja ${entry.version} ${entry.version_type ? '(' + entry.version_type + ')' : ''} - ${entry.date} ${entry.time} (autor: ${entry.author})`;
      details.appendChild(summary);

      // Sekcje do wyświetlenia
      const sections = [
        { title: "Nowości", key: "new_features" },
        { title: "Zapowiedzi", key: "upcoming" },
        { title: "Znane błędy", key: "known_issues" },
        { title: "Bug Fixy", key: "bug_fixes" },
        { title: "Ostrzeżenia", key: "warnings" },
      ];

      sections.forEach(section => {
        if (entry[section.key] && entry[section.key].some(item => item !== "--")) {
          const secHeader = document.createElement('h4');
          secHeader.textContent = section.title;
          details.appendChild(secHeader);

          const ul = document.createElement('ul');
          entry[section.key].forEach(item => {
            if(item !== "--") {
              const li = document.createElement('li');
              li.textContent = item;
              ul.appendChild(li);
            }
          });
          details.appendChild(ul);
        }
      });

      container.appendChild(details);
    });
  });
</script>

</body>

</html>
