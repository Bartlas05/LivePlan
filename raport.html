<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Zgłoś błąd - Live Plan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #F4F6F8;
            color: #2A2B47;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-weight: 600;
            margin-bottom: 20px;
            margin-top: 40px;
            text-align: center;
            font-size: 24px;
        }

        form {
            background-color: #FFF;
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        label {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input, select, textarea {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid transparent;
            background-color: #F4F6F8;
            outline: none;
            transition: border-color 0.2s;
            resize: vertical;
            color: #2A2B47;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #325B7A;
        }

        button {
            font-family: 'Poppins', sans-serif;
            background-color: #2A2B47;
            color: #FFF;
            font-weight: 500;
            font-size: 15px;
            padding: 14px;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 5px;
            width: 100%;
        }

        button:hover {
            background-color: #325B7A;
        }

        button:active {
            transform: scale(0.98);
        }

        a {
            text-decoration: none;
            width: 100%;
            max-width: 400px;
        }

        a button {
            background-color: #FFF;
            color: #2A2B47;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        br {
            display: none;
        }
    </style>
</head>

<body>

    <h2>Wyślij zgłoszenie</h2>

    <!-- Formularz z typem -->
    <form id="bugForm">
        <label>
            Typ raportu:
            <select id="type" required>
                <option value="" disabled selected>Wybierz typ</option>
                <option value="Błąd">Błąd</option>
                <option value="Pomysł">Pomysł</option>
            </select>
        </label>
        <br><br>
        <label>
            Tytuł:
            <input type="text" id="title" placeholder="Krótki tytuł błędu" required>
        </label>
        <br><br>
        <label>
            Opis:
            <textarea id="description" placeholder="Opisz co się stało..." rows="5" required></textarea>
        </label>
        <br><br>
        <button type="submit">Wyślij raport</button>

    </form>
    <a href="index.html"><button>Powrót do ustawień</button></a>

    <script>
        document.getElementById("bugForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const type = document.getElementById("type").value;
            const title = document.getElementById("title").value;
            const description = document.getElementById("description").value;

            // Dodaj typ raportu na początku treści
            const body = `
**Typ raportu:** ${type}
URL: ${window.location.href}
User agent: ${navigator.userAgent}
Opis:
${description}
`;

            try {
                const res = await fetch("/.netlify/functions/report", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ title, body })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    alert("Raport wysłany! Link do issue: " + data.html_url);

                    // Wyczyść formularz
                    document.getElementById("type").value = "";
                    document.getElementById("title").value = "";
                    document.getElementById("description").value = "";
                } else {
                    alert("Nie udało się wysłać raportu. Błąd: " + (data.error || "Nieznany błąd"));
                }

                console.log(data);
            } catch (err) {
                console.error(err);
                alert("Coś poszło nie tak, sprawdź konsolę.");
            }
        });
    </script>

</body>

</html>
