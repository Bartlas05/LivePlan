<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Test raportowania błędów</title>
</head>

<body>

    <h2>Raportuj błąd V2</h2>

    <!-- Prosty formularz -->
    <form id="bugForm">
        <label>
            Tytuł:
            <input type="text" id="title" placeholder="Krótki tytuł błędu" required>
        </label>
        <br><br>
        <label>
            Opis:
            <textarea id="description" placeholder="Opisz co się stało..." rows="5" required></textarea>
        </label>
        <br><br>
        <button type="submit">Wyślij raport</button>
    </form>

    <script>
        document.getElementById("bugForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const title = document.getElementById("title").value;
            const description = document.getElementById("description").value;

            const body = `
URL: ${window.location.href}
User agent: ${navigator.userAgent}
Opis błędu:
${description}
  `;

            try {
                const res = await fetch("/.netlify/functions/report", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ title, body })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    alert("Raport wysłany! Link do issue: " + data.html_url);

                    // Opcjonalnie wyczyść formularz
                    document.getElementById("title").value = "";
                    document.getElementById("description").value = "";
                } else {
                    alert("Nie udało się wysłać raportu. Błąd: " + (data.error || "Nieznany błąd"));
                }

                console.log(data);
            } catch (err) {
                console.error(err);
                alert("Coś poszło nie tak, sprawdź konsolę.");
            }
        });
    </script>

</body>

</html>
