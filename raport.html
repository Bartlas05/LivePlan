<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Zgłoś błąd - Live Plan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #F4F6F8;
            color: #2A2B47;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-weight: 600;
            margin-bottom: 20px;
            margin-top: 40px;
            text-align: center;
            font-size: 24px;
        }

        form {
            background-color: #FFF;
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        label {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input, select, textarea {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid transparent;
            background-color: #F4F6F8;
            outline: none;
            transition: border-color 0.2s;
            resize: vertical;
            color: #2A2B47;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #325B7A;
        }

        button {
            font-family: 'Poppins', sans-serif;
            background-color: #2A2B47;
            color: #FFF;
            font-weight: 500;
            font-size: 15px;
            padding: 14px;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 5px;
            width: 100%;
        }

        button:hover {
            background-color: #325B7A;
        }

        button:active {
            transform: scale(0.98);
        }

        a {
            text-decoration: none;
            width: 100%;
            max-width: 400px;
        }

        a button {
            background-color: #FFF;
            color: #2A2B47;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        br {
            display: none;
        }
    </style>
</head>

<body>

    <h2>Wyślij zgłoszenie</h2>

    <!-- Formularz z typem -->
    <form id="bugForm">
        <label>
            Typ raportu:
            <select id="type" required>
                <option value="" disabled selected>Wybierz typ</option>
                <option value="NOTE">Informacja</option>
                <option value="TIP">Wskazówka</option>
                <option value="IMPORTANT">Ważne</option>
                <option value="WARNING">Ostrzeżenie</option>
                <option value="CAUTION">Uwaga</option>
            </select>
        </label>
        <label>
            Tytuł:
            <input type="text" id="title" placeholder="Krótki tytuł błędu" required>
        </label>
        <label>
            Opis:
            <textarea id="description" placeholder="Opisz co się stało..." rows="5" required></textarea>
        </label>
        <label style="flex-direction: row; align-items: center; justify-content: flex-start; gap: 10px; cursor: pointer;">
            <input type="checkbox" id="shareDiagnostics" style="width: auto; margin: 0; cursor: pointer;">
            Dołącz dane diagnostyczne
        </label>
        <label>
            Nazwa użytkownika:
            <input type="text" id="username" placeholder="@username">
            <span style="font-size: 11px; color: #777; font-weight: 400; margin-top: -5px;">*opcjonalnie, np. przedstaw się albo wykorzystaj Twój nick z GitHub zaczynając od @</span>
        </label>
        <button type="submit">Wyślij raport</button>

    </form>
    <a href="index.html"><button>Powrót do strony głównej</button></a>

    <script>
        function getOS() {
            const userAgent = window.navigator.userAgent;
            const platform = window.navigator.platform;
            const macosPlatforms = ['Macintosh', 'MacIntel', 'MacPPC', 'Mac68K'];
            const windowsPlatforms = ['Win32', 'Win64', 'Windows', 'WinCE'];
            const iosPlatforms = ['iPhone', 'iPad', 'iPod'];
            let os = null;

            if (macosPlatforms.indexOf(platform) !== -1) {
                os = 'Mac OS';
            } else if (iosPlatforms.indexOf(platform) !== -1) {
                os = 'iOS';
            } else if (windowsPlatforms.indexOf(platform) !== -1) {
                os = 'Windows';
            } else if (/Android/.test(userAgent)) {
                os = 'Android';
            } else if (!os && /Linux/.test(platform)) {
                os = 'Linux';
            }

            return os;
        }

        function getBrowser() {
            const ua = navigator.userAgent;
            let tem;
            let M = ua.match(/(opera|chrome|safari|firefox|msie|trident(?=\/))\/?\s*(\d+)/i) || [];
            if (/trident/i.test(M[1])) {
                tem = /\brv[ :]+(\d+)/g.exec(ua) || [];
                return 'IE ' + (tem[1] || '');
            }
            if (M[1] === 'Chrome') {
                tem = ua.match(/\b(OPR|Edge?)\/(\d+)/);
                if (tem != null) return tem.slice(1).join(' ').replace('OPR', 'Opera').replace('Edg ', 'Edge ');
            }
            M = M[2] ? [M[1], M[2]] : [navigator.appName, navigator.appVersion, '-?'];
            if ((tem = ua.match(/version\/(\d+)/i)) != null) M.splice(1, 1, tem[1]);
            return M.join(' ');
        }

        document.getElementById("bugForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const type = document.getElementById("type").value;
            const title = document.getElementById("title").value;
            const description = document.getElementById("description").value;
            const shareDiagnostics = document.getElementById("shareDiagnostics").checked;
            const usernameInput = document.getElementById("username").value.trim();

            const username = usernameInput ? usernameInput : "Wysłano anonimowo";
            const userString = usernameInput ? `Od: ${usernameInput}` : `Od: Wysłano anonimowo`;

            let diagnosticsMarkdown = "";
            if (shareDiagnostics) {
                const browser = getBrowser() || "Nieznana";
                const os = getOS() || "Nieznany";
                const userAgentDisplay = navigator.userAgent;
                
                // Nowe parametry
                const language = navigator.language || "Nieznany";
                const screenRes = `${window.screen.width}x${window.screen.height}`;
                const windowSize = `${window.innerWidth}x${window.innerHeight}`;
                const theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? "Ciemny" : "Jasny";
                const localTime = new Date().toLocaleString('pl-PL');
                const isOnline = navigator.onLine ? "Tak" : "Nie";
                const cookiesEnabled = navigator.cookieEnabled ? "Tak" : "Nie";

                diagnosticsMarkdown = `

Informacje diagnostyczne
---
<details>
<summary>Kliknij żeby wyświetlić informacje diagnostyczne</summary>

| Parametr            | Wartość|
|---------------------|----------------|
| Przeglądarka        | ${browser}     |
| User agent          | ${userAgentDisplay} |
| Wersja OS           | ${os}          |
| Język               | ${language}    |
| Rozdzielczość ekranu| ${screenRes}   |
| Rozmiar okna        | ${windowSize}  |
| Motyw systemowy     | ${theme}       |
| Czas lokalny        | ${localTime}   |
| Online              | ${isOnline}    |
| Cookies włączone    | ${cookiesEnabled} |
  
</details>`;
            }

            const body = `# Zgłoszenie od użytkownika
> [!${type}]
> **${title}**
> ${description.replace(/\n/g, '\n> ')}

> ${userString}
    ![Version](https://img.shields.io/badge/Wersja_aplikacji-1.0-blue)
${diagnosticsMarkdown}
`;

            try {
                const res = await fetch("/.netlify/functions/report", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ title, body })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    alert("Raport został wysłany pomyślnie!");

                    // Wyczyść formularz
                    document.getElementById("type").value = "";
                    document.getElementById("title").value = "";
                    document.getElementById("description").value = "";
                    document.getElementById("shareDiagnostics").checked = false;
                    document.getElementById("username").value = "";
                } else {
                    alert("Nie udało się wysłać raportu. Błąd: " + (data.error || "Nieznany błąd"));
                }

                console.log(data);
            } catch (err) {
                console.error(err);
                alert("Coś poszło nie tak, sprawdź konsolę.");
            }
        });
    </script>

</body>

</html>
