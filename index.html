<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <script src="https://kit.fontawesome.com/38cd770473.js" crossorigin="anonymous"></script>
    <title>Live Plan</title>
    <link rel="stylesheet" href="ui.css">
    <script src="script.js"></script>
    <link rel="icon" href="/Icons/Live Plan Icon V2 -- Light.svg" type="image/svg+xml" media="(prefers-color-scheme: light)">
    <link rel="icon" href="/Icons/Live Plan Icon V2 -- Dark.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="/Icons/Live Plan Icon V2.1 -- Light (IOS) 512x512.png">
</head>

<body>
    <header>
        <div class="userPicture"><i class="fa-solid fa-user-graduate"></i></div>
        <div class="headerTextWrapper">
            <div class="headerTextTop">Witaj</div>
            <div class="headerTextBottom">Live Plan 0.6.3 <div id="betaTag">BETA</div>
            </div>
        </div>
        <a href="settings.html"> <button class="settingsButton"><i class="fa-solid fa-gear"></i></button></a>
    </header>

    <section id="LiveWidget" class="LiveWidget">
        <div class="LiveWidgetTopSection">
            <div class="LiveWidgetTopSectionLeft">
                <div class="LiveWidgetPicture"><i class="fa-solid fa-user-graduate"></i></div>
                <div class="LiveWidgetFirstInfo">
                    <div class="LiveWidgetFirstInfoTop"><span class="ID_type">Wykład</span> • <span
                            class="ID_room">202A</span></div>
                    <div class="LiveWidgetFirstInfoBottom ID_teacher">Maciej Dorobek</div>
                </div>
            </div>
            <div class="LiveWidgetTopSectionRight">
                <div class="LiveWidgetTopSectionRightTopText ID_name">Administracja baz danych</div>
            </div>
        </div>
        <div class="LiveWidgetBottomSection">
            <div class="progressBar">
                <div class="progressBarSlider"></div>
                <div class="progressBarTimeWrapper">
                    <div class="progressBarTime"><span class="ID_start">9:30</span> - <span class="ID_end">11:00</span>
                    </div>
                </div>
            </div>
        </div>
    </section>




    <section class="schedule">
        <div class="scheduleHeader">
            <div class="scheduleHeaderName">Plan zajęć</div>
            <div class="scheduleHeaderDate">8 marzec 2026 • Zjazd 2</div>
        </div>
        <div class="scheduleNav">
            <button class="scheduleNavButton scheduleNavButton--focus">Piątek</button>
            <button class="scheduleNavButton">Sobota</button>
            <button class="scheduleNavButton">Niedziela</button>
        </div>
        <div class="scheduleContent" id="scheduleContent">
            <!-- Tutaj będą dynamicznie generowane bloki zajęć/przerw -->
        </div>
    </section>

    <footer>
        <div id="bottomDock" class="bottomDock">
            <div class="bottomDockLiveWidgetPicture LiveWidgetPicture"><i class="fa-solid fa-user-graduate"></i></div>
            <div class="bottomDockWrapper">
                <div class="bottomDockLiveWidgetFirstInfoTop LiveWidgetFirstInfoTop"><span class="ID_type">Wykład</span>
                    • <span class="ID_room">202A</span></div>
                <div class="bottomDockLiveWidgetTopSectionRightTopText LiveWidgetTopSectionRightTopText ID_name">
                    Administracja
                    baz danych</div>
            </div>
            <div class="progressBarDock progressBar">
                <div class="progressBarSlider"></div>
                <div class="progressBarTimeWrapper">
                    <div class="progressBarTime"><span class="ID_start">9:30</span> - <span class="ID_end">11:00</span>
                    </div>
                </div>
            </div>
        </div>
        <nav>
            <a href="index.html">
                <buttton class="navButton navButton--focus">
                    <i class="fa-solid fa-house"></i>
                    <div class="navButtonText">Home</div>
                </buttton>
            </a>
            <span id="message1">Kolejne funkcje nadejdą w <br> następnych aktualizacjach.</span>
        </nav>
    </footer>

</body>

</html>
